<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pranav Jindal GitHub stats</title>
  <desc id="desc">Local light GitHub stats card for Pranav Jindal.</desc>
  <style>
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes stat-pop {
      0% { opacity: 0; transform: translateY(16px) scale(0.9); }
      70% { opacity: 1; transform: translateY(0) scale(1.05); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
  <rect stroke="#d0d7de" stroke-opacity="1" fill="#FFFEFE" rx="4.5" x="0.5" y="0.5" width="494" height="194"/>
  <line x1="165" y1="28" x2="165" y2="170" stroke="#d0d7de" stroke-width="1" style="opacity: 0; animation: fade-in-up 0.45s ease-out forwards 0.15s"/>
  <line x1="330" y1="28" x2="330" y2="170" stroke="#d0d7de" stroke-width="1" style="opacity: 0; animation: fade-in-up 0.45s ease-out forwards 0.2s"/>
  <text
    x="247.5"
    y="42"
    text-anchor="middle"
    fill="#8250df"
    font-family="'Segoe UI', Ubuntu, Sans-Serif"
    font-size="16"
    font-weight="700"
    style="opacity: 0; animation: fade-in-up 0.5s ease-out forwards 0.1s"
  >GitHub Pulse</text>
  
    <g transform="translate(82.5 0)">
