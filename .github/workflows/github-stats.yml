name: Update GitHub Pulse Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - assets/github-stats.svg
      - assets/github-stats-light.svg
      - assets/github-streak.svg
      - assets/github-streak-light.svg
      - assets/github-activity-graph.svg
      - assets/github-activity-graph-light.svg

permissions:
  contents: write

jobs:
  update-pulse-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate themed stats cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/render-github-stats-fallback.mjs assets/github-stats.svg ${{ github.repository_owner }} dark
          node scripts/render-github-stats-fallback.mjs assets/github-stats-light.svg ${{ github.repository_owner }} light

      - name: Refresh streak and activity graph cards
        run: |
          set -euo pipefail

          download_card() {
            target="$1"
            primary_url="$2"
            fallback_url="${3:-}"
            tmp_file="$(mktemp)"

            if curl -fsSL --retry 5 --retry-all-errors -A "Mozilla/5.0" "$primary_url" -o "$tmp_file"; then
              :
            elif [ -n "$fallback_url" ] && curl -fsSL --retry 5 --retry-all-errors -A "Mozilla/5.0" "$fallback_url" -o "$tmp_file"; then
              :
            else
              echo "Skipping $target because both sources failed."
              rm -f "$tmp_file"
              return 0
            fi

            if grep -qi "<svg" "$tmp_file"; then
              mv "$tmp_file" "$target"
            else
              echo "Skipping $target because the download was not an SVG."
              rm -f "$tmp_file"
            fi
          }

          download_card \
            assets/github-streak.svg \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&card_width=495&card_height=195" \
            "https://camo.githubusercontent."

          download_card \
            assets/github-streak-light.svg \
            "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=default&hide_border=true&card_width=495&card_height=195"

          node scripts/style-light-streak-card.mjs assets/github-streak-light.svg "#d0d7de"

          download_card \
            assets/github-activity-graph.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=tokyo-night&hide_border=true&area=true&height=320" \
            "https://camo.githubusercontent."

          download_card \
            assets/github-activity-graph-light.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=github-light&hide_border=true&area=true&height=320"

          if [ ! -s assets/github-activity-graph-light.svg ] || ! grep -qi "<svg" assets/github-activity-graph-light.svg; then
            node scripts/render-github-activity-graph-light.mjs assets/github-activity-graph.svg assets/github-activity-graph-light.svg
          fi

          node scripts/tint-github-activity-graph.mjs assets/github-activity-graph-light.svg "#0969da" "#d0d7de"

      - name: Commit updated cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add assets/github-stats.svg assets/github-stats-light.svg assets/github-streak.svg assets/github-streak-light.svg assets/github-activity-graph.svg assets/github-activity-graph-light.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update GitHub pulse cards [skip ci]"
          git push
